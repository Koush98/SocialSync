name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Run backend tests
        env:
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DATABASE_URL: postgresql://social_manager:dummy@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: uv run pytest tests -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_TENANT_ID: tenant_123
        run: npm run build
